environment: local

local {
  services {
    host: "http://localhost"
    icb {
      port: 11118
      productionRoute: ""
    }
    auth {
          port = 8585
          productionRoute = ""
        }
     desnz {
          port = 11118
          productionRoute = ""
        }
        hip {
          port = 11119
          productionRoute = ""
        }
  }
  baseApiUrl: "http://localhost:11118"
}

dev {
  services {
    icb {
      host: "https://individuals-child-benefit-api.protected.mdtp"
      productionRoute: ""
    }
  }
  baseApiUrl: "https://individuals-child-benefit-api.protected.mdtp"
}

staging {
  services {
    icb {
      host: "https://individuals-child-benefit-api.protected.mdtp"
      productionRoute: ""
    }
  }
  baseApiUrl: "https://individuals-child-benefit-api.protected.mdtp"
}

hip {
  clientId = "local-client-id"
  clientSecret = "local-client-secret"
}

oauth {
  clientId = "oauth-client-id"
  clientSecret = "oauth-client-secret"
  totpSecret = "oauth-totp-secret"
}
